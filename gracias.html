<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado — CLOZKY Studios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black: #000; --white: #fff; --gray-dark: #0f0f0f; --gray-mid: #1a1a1a; --gray-light: #888; --red: #cc0000; --border: rgba(255,255,255,0.1); }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.18em; margin-bottom: 56px; }
        .logo img { height: 32px; filter: brightness(0) invert(1); object-fit: contain; display: block; }

        .card { background: var(--gray-dark); max-width: 560px; width: 100%; padding: 48px; }
        .status-icon { margin-bottom: 28px; }
        .title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 0.04em; line-height: 1; margin-bottom: 10px; }
        .subtitle { font-size: 13px; color: var(--gray-light); line-height: 1.9; margin-bottom: 36px; }

        .ref-box { background: var(--gray-mid); padding: 14px 20px; margin-bottom: 36px; }
        .ref-label { font-size: 9px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gray-light); margin-bottom: 6px; }
        .ref-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.06em; }

        .order-items { margin-bottom: 28px; }
        .order-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .order-item:last-child { border-bottom: none; }
        .order-item .name { font-weight: 500; }
        .order-item .detail { font-size: 11px; color: var(--gray-light); margin-top: 2px; }
        .order-item .price { font-family: 'Bebas Neue', sans-serif; font-size: 18px; }

        .total-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid var(--border); }
        .total-row .label { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; }
        .total-row .val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; }

        .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 36px; }
        .btn-primary { display: block; text-align: center; padding: 16px; background: var(--white); color: var(--black); text-decoration: none; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 700; transition: background 0.3s, color 0.3s; }
        .btn-primary:hover { background: var(--red); color: var(--white); }
        .btn-ghost { display: block; text-align: center; padding: 15px; border: 1px solid var(--border); color: var(--gray-light); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
        .btn-ghost:hover { border-color: var(--white); color: var(--white); }

        .error-card { text-align: center; }
        .error-card .title { color: var(--red); }
    </style>
</head>
<body>

<div class="logo">
    <img src="assets/logo.png" alt="CLOZKY"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span style="display:none">CLOZKY</span>
</div>

<div class="card" id="main-card">
    <!-- contenido generado por JS -->
</div>

<script>
    const fmt = n => '$' + Number(n).toLocaleString('es-CO');

    const params  = new URLSearchParams(window.location.search);
    const status  = params.get('payment-status') || params.get('status');
    const txId    = params.get('id');

    let order = null;
    try { order = JSON.parse(localStorage.getItem('clzky_order') || 'null'); } catch(e) {}

    const card = document.getElementById('main-card');

    if (status === 'APPROVED' || (!status && order)) {
        // ── ÉXITO ──
        const itemsHtml = order ? order.items.map(i => `
            <div class="order-item">
                <div>
                    <div class="name">${i.name}</div>
                    <div class="detail">Talla: ${i.size} · Cant: ${i.qty}</div>
                </div>
                <div class="price">${fmt(i.price * i.qty)}</div>
            </div>`).join('') : '';

        const totalHtml = order ? `
            <div class="total-row">
                <span class="label">Total pagado</span>
                <span class="val">${fmt(order.total)}</span>
            </div>` : '';

        card.innerHTML = `
            <div class="status-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 12l3 3 5-5"/>
                </svg>
            </div>
            <h1 class="title">Pedido<br>Confirmado</h1>
            <p class="subtitle">
                ¡Gracias por tu compra! Recibirás un correo de confirmación de Wompi.<br>
                Tu pedido será despachado en 1–3 días hábiles.
            </p>
            ${order ? `<div class="ref-box">
                <div class="ref-label">Referencia de pago</div>
                <div class="ref-val">${order.reference}</div>
            </div>` : ''}
            ${order ? `<div class="order-items">${itemsHtml}</div>${totalHtml}` : ''}
            <div class="actions">
                <a href="index.html" class="btn-primary">Seguir comprando</a>
                <a href="https://www.instagram.com/clozkystudios" target="_blank" class="btn-ghost">Seguirnos en Instagram</a>
            </div>`;

        // Limpiar carrito
        localStorage.removeItem('clzky_cart');
        localStorage.removeItem('clzky_order');

    } else if (status === 'DECLINED' || status === 'ERROR' || status === 'VOIDED') {
        // ── RECHAZADO ──
        card.innerHTML = `
            <div class="error-card">
                <div class="status-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cc0000" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                </div>
                <h1 class="title" style="color:var(--red)">Pago No<br>Procesado</h1>
                <p class="subtitle">Tu pago fue rechazado o cancelado. No se realizó ningún cobro.<br>Vuelve e intenta con otro método de pago.</p>
                <div class="actions">
                    <a href="checkout.html" class="btn-primary">Reintentar pago</a>
                    <a href="index.html" class="btn-ghost">Volver a la tienda</a>
                </div>
            </div>`;

    } else if (status === 'PENDING') {
        // ── PENDIENTE ──
        card.innerHTML = `
            <div style="text-align:center">
                <div class="status-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <h1 class="title" style="color:#f59e0b">Pago<br>Pendiente</h1>
                <p class="subtitle">Tu pago está siendo procesado. Recibirás un correo cuando se confirme.</p>
                ${order ? `<div class="ref-box"><div class="ref-label">Referencia</div><div class="ref-val">${order.reference}</div></div>` : ''}
                <div class="actions">
                    <a href="index.html" class="btn-primary">Volver a la tienda</a>
                </div>
            </div>`;

    } else {
        // Sin status — acceso directo
        card.innerHTML = `
            <h1 class="title">Hola</h1>
            <p class="subtitle">Esta página confirma tus pedidos luego de un pago exitoso con Wompi.</p>
            <div class="actions">
                <a href="index.html" class="btn-primary">Ir a la tienda</a>
            </div>`;
    }
</script>
</body>
</html>
